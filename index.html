<div class="controls">
  <label class="small">Barajas:
    <select id="selectDecks">
      <option value="2">2</option>
      <option value="4">4</option>
      <option value="6" selected>6</option>
    </select>
  </label>

  <label class="small">Min apuesta:
    <input id="minBet" type="number" value="10" min="1" style="width:80px">
  </label>

  <button id="btnNewShoe">Nueva mezcla</button>
  <button id="btnResetBank">Reiniciar banca</button>

  <div style="margin-left:auto" class="small">Banca: <strong id="bankDisplay">1000</strong> u</div>
</div>

<div class="row">
  <div class="panel" style="flex:2">
    <div style="display:flex;justify-content:space-between">
      <div>
        <div class="small">Contador (Hi‑Lo):</div>
        <div class="stats">
          <div class="stat">Running: <strong id="runningCount">0</strong></div>
          <div class="stat">True: <strong id="trueCount">0</strong></div>
          <div class="stat">Barajas restantes: <strong id="decksLeft">0</strong></div>
        </div>
      </div>

      <div style="text-align:right">
        <div class="small">Apuesta sugerida:</div>
        <div><strong id="suggestedBet">10</strong> u</div>
        <div class="small">Apuesta actual:</div>
        <input id="betInput" type="number" value="10" min="1" style="width:100px">
        <div class="small" style="margin-top:6px">Estado: <span id="status">Esperando mezcla</span></div>
      </div>
    </div>

    <hr style="border:none;height:8px">

    <div>
      <h3 style="margin:4px 0">Dealer</h3>
      <div id="dealerHand" class="hand" aria-live="polite"></div>
      <div class="small">Valor: <span id="dealerValue">—</span></div>
    </div>

    <div style="margin-top:10px">
      <h3 style="margin:4px 0">Jugador</h3>
      <div id="playerHandsContainer"></div>
      <div class="small">Mano activa: <span id="activeHandIndex">—</span></div>
    </div>

    <div class="actions" style="margin-top:8px">
      <button id="btnDeal">Repartir</button>
      <button id="btnHit" disabled>Pedir</button>
      <button id="btnStand" disabled>Plantarse</button>
      <button id="btnDouble" disabled>Doblar</button>
      <button id="btnSplit" disabled>Dividir</button>
    </div>

    <div style="margin-top:8px">
      <div class="small">Estrategia básica recomienda:</div>
      <div class="small recommend" id="strategyRec">—</div>
      <div class="small" style="margin-top:6px">Desviaciones recomendadas según True Count (TC):</div>
      <ul class="small" id="deviationsList"></ul>
    </div>

  </div>
